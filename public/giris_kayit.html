<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Sitesi - Giriş / Kayıt</title>
    <link rel="stylesheet" href="giris_kayit.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
</head>
<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="navbar-wrapper">
            <div class="logo-wrapper">
                <a href="index.html" style="text-decoration: none;">
                    <h1 class="logo">ALEYFLIX</h1>
                </a>
            </div>
            <div class="menu-container">
                <ul class="menu-list">
                    <li class="menu-list-item active"><a href="index.html">Ana Sayfa</a></li>
                    <li class="menu-list-item"><a href="filmler.html">Filmler</a></li>
                    <li class="menu-list-item"><a href="onerilenler.html">Önerilenler</a></li>
                </ul>
            </div>
            <div class="profile-container">
                <div class="profile-text-container">
                    <span class="profile-xtext">Hesabım</span>
                    <i class="bi bi-caret-down-fill"></i>
                </div>
                <div class="dropdown-content">
                    <a href="ayarlar.html">Ayarlar</a>
                    <a href="#">Çıkış</a>
                </div>
            </div>
        </div>
    </div>
    <!-- Sidebar -->
    <div class="sidebar">
        
        <a href="kaydedilenler.html"><i class="bi bi-bookmarks-fill"></i></a>
        <a href="ayarlar.html"><i class="bi bi-gear-fill"></i></a>
    </div>

    <!-- Giriş / Kayıt Formu -->
    <div class="auth-container">
        <h2 id="formTitle">Giriş Yap</h2>
        
        <form id="loginForm">
            <label for="loginUsername">Mail:</label>
            <input type="text" id="loginUsername" name="loginUsername" required><br>
    
            <label for="loginPassword">Şifre:</label>
            <input type="password" id="loginPassword" name="loginPassword" required><br>
    
            <button type="submit">Giriş Yap</button>
        </form>
    
        <div id="successMessage" style="display:none; color: green; font-weight: bold;">Giriş Başarılı!</div>

        <form id="registerForm" style="display: none;">
            <label for="registerEmail">E-Posta:</label>
            <input type="email" id="registerEmail" required>

            <label for="registerUsername">Kullanıcı Adı:</label>
            <input type="text" id="registerUsername" required>

            <label for="registerPassword">Şifre:</label>
            <input type="password" id="registerPassword" required>

            <div id="recoveryWordContainer">
                <label for="recoveryWord">Şifre Kurtarma Kelimesi:</label>
                <input type="text" id="recoveryWord" required>
            </div>

            <button type="submit">Kayıt Ol</button>
        </form>

        <p><a href="#" id="forgotPassword">Şifremi Unuttum</a></p>
        <p id="switchText">Henüz hesabın yok mu? <a href="#" id="switchLink">Kayıt Ol</a></p>
        <p id="switchToLoginText" style="display: none;">Zaten hesabınız var mı? <a href="#" id="switchToLoginLink">Giriş Yap</a></p>
    </div>
    <!-- Şifre Sıfırlama Formu -->
    <div id="resetPasswordForm" style="display:none; margin-top:20px;">
        <h3>Şifre Sıfırlama</h3>
        <input type="text" id="resetEmailOrUsername" placeholder="Mail veya Kullanıcı Adı"><br>
        <input type="text" id="resetRecoveryWord" placeholder="Sıfırlama Kelimesi"><br>
        <input type="password" id="resetNewPassword" placeholder="Yeni Şifre"><br>
        <input type="password" id="resetConfirmPassword" placeholder="Yeni Şifre (Tekrar)"><br>
        <button id="resetPasswordBtn">Şifreyi Sıfırla</button>
        <button id="cancelResetBtn">İptal</button>
    </div>
  

  <script>
    // Giriş işlemi
    document.getElementById('loginForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('loginUsername').value;
        const şifre = document.getElementById('loginPassword').value;

        const submitBtn = document.querySelector('#loginForm button[type="submit"]');
        const originalBtnText = submitBtn.textContent;
        submitBtn.textContent = 'Giriş Yapılıyor...';
        submitBtn.disabled = true;

        fetch('http://127.0.0.1:3000/giris', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: email, şifre: şifre })
        })
        .then(response => {
            if (!response.ok) throw new Error(`HTTP hatası! Durum: ${response.status}`);
            return response.json();
        })
        .then(data => {
            console.log('Sunucu yanıtı:', data);

            if (data.mesaj && data.mesaj.includes('başarılı')) {
                if (data.token) localStorage.setItem('token', data.token);
                if (data.userId) localStorage.setItem('userId', data.userId);

                document.getElementById('successMessage').textContent = 'Giriş başarılı! Yönlendiriliyorsunuz...';
                document.getElementById('successMessage').style.display = 'block';

                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';

                setTimeout(() => {
                    const redirectUrl = localStorage.getItem('redirectAfterLogin');
                    if (redirectUrl) {
                        localStorage.removeItem('redirectAfterLogin');
                        window.location.href = redirectUrl;
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 1000);

            } else {
                if (data.error === 'Kullanıcı bulunamadı') {
                    alert('Bu e-posta adresi ile kayıtlı kullanıcı bulunamadı.');
                } else if (data.error === 'Şifre hatalı') {
                    alert('Girdiğiniz şifre hatalı. Lütfen tekrar deneyin.');
                } else {
                    alert(data.error || 'Giriş yapılırken bir hata oluştu.');
                }
            }
        })
        .catch(error => {
            console.error('İşlem hatası:', error);
            if (error.message.includes('HTTP hatası')) {
                if (error.message.includes('404')) {
                    alert('Bu e-posta adresi ile kayıtlı kullanıcı bulunamadı.');
                } else if (error.message.includes('401')) {
                    alert('Girdiğiniz şifre hatalı. Lütfen tekrar deneyin.');
                } else {
                    alert('Sunucu hatası oluştu. Lütfen daha sonra tekrar deneyin.');
                }
            } else {
                alert('Giriş işlemi başarısız: ' + error.message);
            }
        })
        .finally(() => {
            submitBtn.textContent = originalBtnText;
            submitBtn.disabled = false;
        });
    });

    // Kayıt işlemi
    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('registerEmail').value;
        const kullanıcıAdı = document.getElementById('registerUsername').value;
        const şifre = document.getElementById('registerPassword').value;
        const recoveryWord = document.getElementById('recoveryWord').value;

        fetch('http://127.0.0.1:3001/kaydol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email: email,
                kullanıcı_adı: kullanıcıAdı,
                şifre: şifre,
                kelime: recoveryWord
            })
        })
        .then(async response => {
            const data = await response.json();
            console.log('Kayıt yanıtı:', data);

            if (response.ok) {
                alert(data.mesaj);
                document.getElementById('formTitle').innerText = 'Giriş Yap';
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('switchText').style.display = 'block';
                document.getElementById('switchToLoginText').style.display = 'none';
            } else {
                const errorMessage = data.error || data.mesaj || '';
                console.log('Hata mesajı:', errorMessage);

                if (errorMessage.toLowerCase().includes('kullanıcı adı')) {
                    alert('Bu kullanıcı adını alamazsınız. Lütfen başka bir kullanıcı adı deneyiniz.');
                } else if (errorMessage.toLowerCase().includes('e-posta')) {
                    alert('Bu e-posta adresi ile bir hesap zaten mevcut. Lütfen giriş yapın veya başka bir e-posta adresi kullanın.');
                } else if (errorMessage) {
                    alert(errorMessage);
                } else {
                    alert('Kayıt işlemi sırasında bir hata oluştu. Lütfen tekrar deneyin.');
                }
            }
        })
        .catch(error => {
            console.error('Kayıt hatası:', error);
            if (error.message.includes('HTTP hatası')) {
                if (error.message.includes('409')) {
                    alert('Bu e-posta adresi veya kullanıcı adı zaten kullanımda. Lütfen farklı bir değer deneyin.');
                } else {
                    alert('Sunucuya bağlanılamadı. Lütfen daha sonra tekrar deneyin.');
                }
            } else {
                alert('Kayıt işlemi başarısız: ' + error.message);
            }
        });
    });

    // Form geçişleri
    document.getElementById('switchLink').addEventListener('click', function() {
        document.getElementById('formTitle').innerText = 'Kayıt Ol';
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('switchText').style.display = 'none';
        document.getElementById('switchToLoginText').style.display = 'block';
    });

    document.getElementById('switchToLoginLink').addEventListener('click', function() {
        document.getElementById('formTitle').innerText = 'Giriş Yap';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('switchText').style.display = 'block';
        document.getElementById('switchToLoginText').style.display = 'none';
    });

    // Şifre sıfırlama işlemi
    document.getElementById('forgotPassword').addEventListener('click', function(event) {
        event.preventDefault();

        const emailOrUsername = prompt("Mail / Kullanıcı Adı:");

        if (!emailOrUsername) {
            alert("Lütfen Mail veya Kullanıcı Adı giriniz.");
            return;
        }

        fetch('http://127.0.0.1:3002/kullanici_kontrol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ emailOrUsername: emailOrUsername })
        })
        .then(response => response.json())
        .then(data => {
            if (data.exists) {
                const recoveryWord = prompt("Şifre sıfırlama kelimenizi giriniz:");

                if (!recoveryWord) {
                    alert("Lütfen şifre sıfırlama kelimesini giriniz.");
                    return;
                }

                fetch('http://127.0.0.1:3002/sifre_sifirla', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emailOrUsername: emailOrUsername, recoveryWord: recoveryWord })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        const newPassword = prompt("Yeni şifrenizi giriniz:");

                        if (!newPassword) {
                            alert("Lütfen yeni şifrenizi giriniz.");
                            return;
                        }

                        const confirmPassword = prompt("Şifrenizi onaylayın:");

                        if (!confirmPassword) {
                            alert("Lütfen şifrenizi onaylayın.");
                            return;
                        }

                        if (newPassword === confirmPassword) {
                            fetch('http://127.0.0.1:3002/guncelle_sifre', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ emailOrUsername: emailOrUsername, newPassword: newPassword })
                            })
                            .then(response => response.json())
                            .then(data => {
                                if (data.success) {
                                    alert('Şifreniz başarıyla sıfırlandı!');
                                } else {
                                    alert('Şifre sıfırlama sırasında bir hata oluştu.');
                                }
                            })
                            .catch(error => {
                                console.error('Sunucu hatası:', error);
                                alert('Şifre sıfırlama işlemi sırasında bir hata oluştu.');
                            });
                        } else {
                            alert("Şifreler uyuşmuyor. Lütfen tekrar deneyin.");
                        }
                    } else {
                        alert('Şifre sıfırlama kelimesi hatalı.');
                    }
                })
                .catch(error => {
                    console.error('Sunucu hatası:', error);
                    alert('Şifre sıfırlama işlemi sırasında bir hata oluştu.');
                });

            } else {
                alert("Böyle bir hesap bulunamadı.");
            }
        })
        .catch(error => {
            console.error('Sunucu hatası:', error);
            alert('Kullanıcı adı veya mail kontrolü sırasında bir hata oluştu.');
        });
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Sitesi - Bilgi Güncelleme</title>
    <link rel="stylesheet" href="ayarlar.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  </head>
  <body>

    <!-- ! navbar başlangıcı -->
    <div class="navbar">
      <div class="navbar-wrapper">
        <div class="logo-wrapper">
          <a href="index.html" style="text-decoration: none;">
            <h1 class="logo">ALEYFLIX</h1>
          </a>
        </div>
        <div class="menu-container">
          <ul class="menu-list">
            <li class="menu-list-item active"><a href="index.html">Ana Sayfa</a></li>
            <li class="menu-list-item"><a href="filmler.html">Filmler</a></li>
            <li class="menu-list-item"><a href="onerilenler.html">Önerilenler</a></li>
          </ul>
        </div>
        <div class="profile-container">
          <div class="profile-text-container">
            <span class="profile-text">Hesabım</span>
            <i class="bi bi-caret-down-fill"></i>
          </div>
          <div class="dropdown-content">
            <a href="#">Ayarlar</a>
            <a href="#" id="cikis-butonu">Çıkış</a>
          </div>
        </div>
      </div>
    </div> 
    <!-- ! navbar bitişi -->

    <!-- ! sidebar başlangıcı -->
    <div class="sidebar">
      
      <a href="kaydedilenler.html">
        <i class="bi bi-bookmarks-fill"></i>
      </a>
      <a href="ayarlar.html">
        <i class="bi bi-gear-fill"></i>
      </a>
    </div>
    <!-- ! sidebar bitişi -->

    <!-- ! içerik alanı başlangıcı -->
    <div class="container">
      <div class="profil-duzenleme-alani">
        
        <!--Mevcut Bilgiler -->
        <div class="mevcut-bilgiler">
          <h2>Mevcut Bilgileriniz</h2>
          <ul>
            <li><strong>Kullanıcı Adı:</strong> <span id="kullanici-adi"></span></li>
            <li><strong>Email:</strong> <span id="kullanici-email"></span></li>
              <li><strong>Şifre Kurtarma Kelimesi:</strong> <span id="kullanici-kelime"></span></li>
          </ul>
        </div>

        

        
        <div class="bilgi-guncelleme-formu">
          <br>
          <form id="bilgiGuncellemeFormu">
            <div class="section">
              <h1>Kullanıcı Bilgilerini Güncelleme</h1>
              
              <label for="username">Kullanıcı Adı:</label>
              <input type="text" id="username" name="username" placeholder="kullanıcı adı">
            </div>
            <div class="section">
              <label for="email">Email:</label>
              <input type="email" id="email" name="email" placeholder="example@gmail.com">
            </div>
            <div class="section">
              <label for="password">Şifre:</label>
              <input type="password" id="password" name="password" placeholder="******">
            </div>
            <div class="section">
              <label for="confirm-password">Şifreyi Onayla:</label>
              <input type="password" id="confirm-password" name="confirm-password" placeholder="******">
            </div>
            <div class="section">
              <label for="word">Şifre kurtarma kelimeniz:</label>
              <input type="text" id="word" name="word" placeholder="######">
            </div>
            <br>
            <button type="submit" class="submit-btn">Kaydet</button>
          </form>
        </div>

        <!-- Değerlendirmeler Bölümü -->
        <div class="degerlendirmeler-alani">
          <h2 id="degerlendirmeler-baslik">Değerlendirmeleriniz</h2>
          <div class="degerlendirmeler-listesi" id="degerlendirmeler-listesi">
            <!-- Değerlendirmeler JavaScript ile buraya eklenecek -->
          </div>
        </div>

      </div>
    </div>
    <!-- ! içerik alanı bitişi -->

    <script src="script.js"></script>
    <script>
        // Çıkış işlevi
        async function cikisYap() {
            try {
                const response = await fetch('http://localhost:3000/cikis', {
                    method: 'POST',
                    credentials: 'include'
                });

                if (response.ok) {
                    window.location.href = 'giris_kayit.html';
                } else {
                    console.error('Çıkış yapılırken bir hata oluştu');
                }
            } catch (error) {
                console.error('Çıkış yapılırken bir hata oluştu:', error);
            }
        }

        // Değerlendirmeleri getir ve göster
async function degerlendirmeleriGetir() {
    const token = localStorage.getItem('token');
    const userId = localStorage.getItem('userId'); // userId'yi localStorage'dan al

    if (!token || !userId) {
        window.location.href = 'giris_kayit.html';
        return;
    }

    try {
        const response = await fetch(`http://localhost:3004/kullanici-degerlendirmeleri?userId=${userId}`, {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                window.location.href = 'giris_kayit.html';
                return;
            }
            throw new Error('Değerlendirmeler getirilemedi');
        }

        const data = await response.json();
        const degerlendirmelerListesi = document.getElementById('degerlendirmeler-listesi');
        const degerlendirmelerBaslik = document.getElementById('degerlendirmeler-baslik');

        // Başlığı güncelle
        degerlendirmelerBaslik.textContent = `${data.kullaniciAdi} adlı kullanıcının Değerlendirmeleri`;

        if (data.degerlendirmeler.length === 0) {
            degerlendirmelerListesi.innerHTML = '<p class="bos-mesaj">Henüz hiç film değerlendirmemişsiniz.</p>';
            return;
        }

        degerlendirmelerListesi.innerHTML = data.degerlendirmeler.map(degerlendirme => `
            <div class="degerlendirme-karti" onclick="filmDetayinaGit(${degerlendirme.film_id})">
                <div class="film-bilgisi">
                    <img src="${degerlendirme.poster_url}" alt="${degerlendirme.film_adi}" class="film-poster">
                    <h3>${degerlendirme.film_adi}</h3>
                </div>
                <div class="degerlendirme-detaylari">
                    <div class="puanlar">
                        <div class="puan">
                            <span>Senaryo:</span>
                            <div class="yildizlar">
                                ${Array(5).fill().map((_, i) => 
                                    `<span class="yildiz ${i < degerlendirme.senaryo ? 'dolu' : ''}">★</span>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="puan">
                            <span>Oyunculuk:</span>
                            <div class="yildizlar">
                                ${Array(5).fill().map((_, i) => 
                                    `<span class="yildiz ${i < degerlendirme.oyunculuk ? 'dolu' : ''}">★</span>`
                                ).join('')}
                            </div>
                        </div>
                        <div class="puan">
                            <span>Yönetmen:</span>
                            <div class="yildizlar">
                                ${Array(5).fill().map((_, i) => 
                                    `<span class="yildiz ${i < degerlendirme.yonetmen ? 'dolu' : ''}">★</span>`
                                ).join('')}
                            </div>
                        </div>
                    </div>
                    ${degerlendirme.yorum ? `
                        <div class="yorum">
                            <p>${degerlendirme.yorum}</p>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');

    } catch (error) {
        console.error('Değerlendirmeler getirilirken hata:', error);
        document.getElementById('degerlendirmeler-listesi').innerHTML =
            '<p class="hata-mesaj">Değerlendirmeler yüklenirken bir hata oluştu.</p>';
    }
}


        // Film detay sayfasına yönlendirme fonksiyonu
        function filmDetayinaGit(filmId) {
            window.location.href = `film_detay.html?id=${filmId}`;
        }

        // Kullanıcı bilgilerini getir ve göster
async function kullaniciBilgileriniGetir() {
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'giris_kayit.html';
        return;
    }

    try {
        const response = await fetch('http://localhost:3000/kullanici-bilgileri', {
            headers: {
                'Authorization': `Bearer ${token}`
            }
        });

        if (!response.ok) {
            if (response.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('userId');
                window.location.href = 'giris_kayit.html';
                return;
            }
            throw new Error('Kullanıcı bilgileri getirilemedi');
        }

        const data = await response.json();

        // Kullanıcı bilgilerini sayfaya yerleştir
        document.getElementById('kullanici-adi').textContent = data.kullaniciBilgileri.kullaniciAdi;
        document.getElementById('kullanici-email').textContent = data.kullaniciBilgileri.email;
        document.getElementById('kullanici-kelime').textContent = data.kullaniciBilgileri.kelime;

    } catch (error) {
        console.error('Kullanıcı bilgileri getirilirken hata:', error);
        alert('Kullanıcı bilgileri yüklenirken bir hata oluştu.');
    }
}

// Sayfa yüklendiğinde değerlendirmeleri getir ve kullanıcı bilgilerini getir
document.addEventListener('DOMContentLoaded', function () {
    const cikisButonu = document.getElementById('cikis-butonu');
    if (cikisButonu) {
        cikisButonu.addEventListener('click', cikisYap);
    }

    degerlendirmeleriGetir();
    kullaniciBilgileriniGetir();
});

        // Bilgi güncelleme formunu dinle
        document.getElementById('bilgiGuncellemeFormu').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'giris_kayit.html';
                return;
            }

            const kullanıcı_adı = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const şifre = document.getElementById('password').value;
            const şifreOnay = document.getElementById('confirm-password').value;
            const kelime = document.getElementById('word').value;

            // Şifre kontrolü
            if (şifre && şifre !== şifreOnay) {
                alert('Şifreler eşleşmiyor!');
                return;
            }

            // Güncellenecek bilgileri hazırla
            const güncellemeBilgileri = {};
            if (kullanıcı_adı) güncellemeBilgileri.kullanıcı_adı = kullanıcı_adı;
            if (email) güncellemeBilgileri.email = email;
            if (şifre) güncellemeBilgileri.şifre = şifre;
            if (kelime) güncellemeBilgileri.kelime = kelime;

            try {
                const response = await fetch('http://localhost:3000/kullanici-guncelle', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(güncellemeBilgileri)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.mesaj || 'Güncelleme sırasında bir hata oluştu');
                }

                alert('Bilgileriniz başarıyla güncellendi!');
                
                // Formu temizle
                document.getElementById('bilgiGuncellemeFormu').reset();
                
                // Güncel bilgileri getir
                kullaniciBilgileriniGetir();

            } catch (error) {
                console.error('Güncelleme hatası:', error);
                alert(error.message);
            }
        });
    </script>
  </body>
</html>

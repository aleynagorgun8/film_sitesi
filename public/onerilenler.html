<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="onerilenler.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" />
</head>
<body>

<!-- Navbar -->
<div class="navbar">
  <div class="navbar-wrapper">
    <div class="logo-wrapper">
      <a href="index.html" style="text-decoration: none;">
        <h1 class="logo">ALEYFLIX</h1>
      </a>
    </div>
    <div class="menu-container">
      <ul class="menu-list">
        <li class="menu-list-item active"><a href="index.html">Ana Sayfa</a></li>
        <li class="menu-list-item"><a href="filmler.html">Filmler</a></li>
        <li class="menu-list-item"><a href="onerilenler.html">Önerilenler</a></li>
      </ul>
    </div>
    <div class="profile-container">
      <div class="profile-text-container">
        <span class="profile-text">Hesabım</span>
        <i class="bi bi-caret-down-fill"></i>
      </div>
      <div class="dropdown-content">
        <a href="ayarlar.html" id="settings-link">Ayarlar</a>
        <a href="#" id="cikis-butonu">Çıkış</a>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  
  <a href="kaydedilenler.html"><i class="bi bi-bookmarks-fill"></i></a>
  <a href="ayarlar.html"><i class="bi bi-gear-fill"></i></a>
</div>

<!-- İçerik -->
<div class="container">
  <br><br>
  <h1 class="page-title">Önerilen Filmler</h1>

  <div class="category">
    <h2>Değerlendirmelerine göre beğenebileceğini düşündüğümüz filmler</h2>
    <div class="movie-list" id="onerilenFilmlerListesi"></div>
  </div>

  <!-- Filtreleme Bölümü -->
  <div class="filter-section">
    <div class="filter-container">
      <select id="turFilter" class="filter-select">
        <option value="">Tüm Türler</option>
      </select>
      <select id="zamanFilter" class="filter-select">
        <option value="">Tüm zamanlar</option>
        <option value="1week">Son 1 Hafta</option>
        <option value="1month">Son 1 Ay</option>
        <option value="3months">Son 3 Ay</option>
        <option value="6months">Son 6 Ay</option>
        <option value="1year">Son 1 Yıl</option>
      </select>
      <button id="filtreleButton" class="filter-button">
        <i class="bi bi-funnel-fill"></i> Filtrele
      </button>
    </div>
  </div>

  <div class="category">
    <h2>En çok beğeni toplayanlar 🤩</h2>
    <div class="movie-list" id="enCokBegeniListesi"></div>
  </div>

  <div class="category">
    <h2>En az beğenilenler 😓</h2>
    <div class="movie-list" id="enAzBegeniListesi"></div>
  </div>

  <div class="category">
    <h2>En çok değerlendirilenler</h2>
    <div class="movie-list" id="enCokDegerlendirmeListesi"></div>
  </div>

  <div class="category">
    <h2>En çok izlenenler</h2>
    <div class="movie-list" id="enCokIzlenmeListesi"></div>
  </div>
</div>

<!-- JavaScript -->
<script>
  async function cikisYap() {
    try {
      const response = await fetch('http://localhost:3000/cikis', {
        method: 'POST',
        credentials: 'include'
      });
      if (response.ok) {
        window.location.href = 'giris_kayit.html';
      } else {
        console.error('Çıkış yapılırken bir hata oluştu');
      }
    } catch (error) {
      console.error('Çıkış yapılırken bir hata oluştu:', error);
    }
  }

  function filmKartOlustur(film) {
    const card = document.createElement('div');
    card.className = 'movie-card';
    card.style.cursor = 'pointer';

    card.innerHTML = `
      <img src="${film.afis_url || 'varsayilan_afis.jpg'}" alt="${film.film_adi}" class="movie-image">
      <div class="movie-info">
        <h2 class="movie-title">${film.film_adi}</h2>
        <p><strong>Yıl:</strong> ${film.yil}</p>
        <p><strong>Tür:</strong> ${film.tur}</p>
        <p><strong>Süre:</strong> ${film.sure_dk} dk</p>
        <p><strong>IMDB:</strong> ${film.imdb_puani}</p>
      </div>
    `;

    card.addEventListener('click', () => {
      window.location.href = `film_detay.html?id=${film.film_id}`;
    });

    return card;
  }

  function bosMesajOlustur() {
    const p = document.createElement('p');
    p.className = 'no-results';
    p.textContent = "Bu kriterlere uygun film bulunamadı.";
    return p;
  }

  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('cikis-butonu').addEventListener('click', cikisYap);
    getTurler();
    getTumu();
    getOnerilenler();
  });

  async function getTurler() {
    try {
      const response = await fetch('http://localhost:3000/filtreleme-verileri');
      const data = await response.json();
      const turSelect = document.getElementById('turFilter');
      if (data.success && data.genres) {
        data.genres.forEach(tur => {
          const option = document.createElement('option');
          option.value = tur;
          option.textContent = tur;
          turSelect.appendChild(option);
        });
      }
    } catch (error) {
      console.error('Türler yüklenirken hata oluştu:', error);
    }
  }

  async function getTumu() {
      await getOnerilenler(); // Kullanıcıya özel önerilenleri en başta çek

    await getKategori('enCokBegeniListesi', 'begeni_cok');
    await getKategori('enAzBegeniListesi', 'begeni_az');
    await getKategori('enCokDegerlendirmeListesi', 'degerlendirme_cok');
    await getKategori('enCokIzlenmeListesi', 'izlenme_cok');
  }

  async function getKategori(listeId, filtre) {
    try {
      const response = await fetch(`http://localhost:3011/filtreli-oneriler?filtre=${filtre}`);
      const data = await response.json();
      const liste = document.getElementById(listeId);
      liste.innerHTML = '';
      if (data.success && Array.isArray(data.filmler) && data.filmler.length > 0) {
        data.filmler.forEach(film => liste.appendChild(filmKartOlustur(film)));
      } else {
        liste.appendChild(bosMesajOlustur());
      }
    } catch (err) {
      console.error(`${filtre} listesi alınırken hata:`, err);
    }
  }

 async function getOnerilenler() {
  try {
    const kullaniciId = localStorage.getItem('kullaniciId');
    const token = localStorage.getItem('token');

    if (!kullaniciId || !token) {
      console.error("Kullanıcı ID veya token localStorage'da bulunamadı. Giriş yapılmamış olabilir.");
      window.location.href = 'giris_kayit.html';
      return;
    }

    const response = await fetch(`http://localhost:3012/onerilen-filmler`, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      credentials: 'include'
    });

    if (!response.ok) {
      if (response.status === 401) {
        console.error('Oturum süresi dolmuş olabilir. Lütfen tekrar giriş yapın.');
        localStorage.removeItem('token');
        localStorage.removeItem('kullaniciId');
        window.location.href = 'giris_kayit.html';
        return;
      }
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    const data = await response.json();
    const liste = document.getElementById('onerilenFilmlerListesi');
    liste.innerHTML = '';

    if (data.success === false) {
      liste.innerHTML = `<p class="error-message">${data.mesaj || 'Filmler yüklenirken bir hata oluştu.'}</p>`;
      return;
    }

    if (data.filmler && Array.isArray(data.filmler) && data.filmler.length > 0) {
      data.filmler.forEach(film => liste.appendChild(filmKartOlustur(film)));
      if (data.mesaj) {
        const mesajElement = document.createElement('p');
        mesajElement.className = 'info-message';
        mesajElement.textContent = data.mesaj;
        liste.insertBefore(mesajElement, liste.firstChild);
      }
    } else {
      liste.appendChild(bosMesajOlustur());
    }
  } catch (err) {
    console.error('Önerilen filmler alınırken bir hata oluştu:', err);
    const liste = document.getElementById('onerilenFilmlerListesi');
    liste.innerHTML = '<p class="error-message">Filmler yüklenirken bir hata oluştu. Lütfen daha sonra tekrar deneyin.</p>';
  }
}

document.getElementById('filtreleButton').addEventListener('click', async function () {
  const tur = document.getElementById('turFilter').value;
  const zaman = document.getElementById('zamanFilter').value;

  await getKategoriFiltreli('enCokBegeniListesi', 'begeni_cok', tur, zaman);
  await getKategoriFiltreli('enAzBegeniListesi', 'begeni_az', tur, zaman);
  await getKategoriFiltreli('enCokDegerlendirmeListesi', 'degerlendirme_cok', tur, zaman);
  await getKategoriFiltreli('enCokIzlenmeListesi', 'izlenme_cok', tur, zaman);
});

async function getKategoriFiltreli(listeId, filtre, tur, zaman) {
  try {
    const response = await fetch(`http://localhost:3011/filtreli-oneriler?filtre=${filtre}&tur=${encodeURIComponent(tur)}&zaman=${zaman}`);
    if (!response.ok) {
      console.error(`Sunucu ${filtre} isteğine şu kodla cevap verdi:`, response.status);
      return;
    }

    const data = await response.json();
    const liste = document.getElementById(listeId);
    liste.innerHTML = '';

    if (data.success && Array.isArray(data.filmler) && data.filmler.length > 0) {
      data.filmler.forEach(film => liste.appendChild(filmKartOlustur(film)));
    } else {
      liste.appendChild(bosMesajOlustur());
    }
  } catch (err) {
    console.error(`${filtre} listesi alınırken hata oluştu:`, err);
  }
}

</script>

</body>
</html>

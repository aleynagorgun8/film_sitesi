<!-- Kaydedilenler Sayfası -->
<div class="container">
  <div class="tablo-container">
    <div class="tablo-bolumu">
      <h1>Kaydedilen Filmler</h1>
      <br>
      <div id="kaydedilenFilmler" class="film-listesi">
          <!-- Filmler buraya dinamik olarak eklenecek -->
      </div>
    </div>

    <div class="tablo-bolumu">
      <h1>İzlediklerim</h1>
      <br>
      <div id="izlenenFilmler" class="film-listesi">
          <!-- İzlenen filmler buraya dinamik olarak eklenecek -->
      </div>
    </div>
  </div>
</div>


  <script src="script.js"></script>
  <script>
    // Kullanıcının giriş yapıp yapmadığını kontrol et
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'giris_kayit.html';
    }

    
    // Çıkış işlevi
    async function cikisYap() {
        try {
            const response = await fetch('http://localhost:3000/cikis', {
                method: 'POST',
                credentials: 'include'
            });

            if (response.ok) {
                // Çıkış başarılı, kullanıcıyı giriş sayfasına yönlendir
                window.location.href = 'giris_kayit.html';
            } else {
                console.error('Çıkış yapılırken bir hata oluştu');
            }
        } catch (error) {
            console.error('Çıkış yapılırken bir hata oluştu:', error);
        }
    }

    // Çıkış butonuna tıklama olayını dinle
    document.addEventListener('DOMContentLoaded', function() {
        const cikisButonu = document.getElementById('cikis-butonu');
        if (cikisButonu) {
            cikisButonu.addEventListener('click', cikisYap);
        }
    });

    // Kaydedilen filmleri getir
    async function kaydedilenFilmleriGetir() {
        try {
            const response = await fetch('http://localhost:3000/kaydedilen-filmler', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error('Filmler getirilemedi');
            }

            const filmler = await response.json();
            const filmListesi = document.getElementById('kaydedilenFilmler');
            filmListesi.innerHTML = ''; // Listeyi temizle

            if (filmler.length === 0) {
                filmListesi.innerHTML = '<p class="bos-mesaj">Henüz kaydedilmiş film bulunmuyor.</p>';
                return;
            }

            filmler.forEach(film => {
                const filmKarti = document.createElement('div');
                filmKarti.className = 'film-karti';
                filmKarti.innerHTML = `
                    <img src="${film.afis_url}" alt="${film.film_adi}" class="film-afis">
                    <div class="film-bilgileri">
                        <h3>${film.film_adi}</h3>
                        <p>${film.yil} • ${film.tur}</p>
                        <p>IMDb: ${film.imdb_puani}</p>
                        <div class="buton-container">
                            <button class="kaldir-btn" data-film-id="${film.film_id}">İzlemekten Vazgeçtim</button>
                            <button class="izledim-btn" data-film-id="${film.film_id}">İzledim</button>
                        </div>
                    </div>
                `;

                // Film kartına tıklama olayı ekle
                filmKarti.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('kaldir-btn') && !e.target.classList.contains('izledim-btn')) {
                        window.location.href = `film_detay.html?id=${film.film_id}`;
                    }
                });

                filmListesi.appendChild(filmKarti);
            });

            // Kaldır butonlarına tıklama olayı ekle
            document.querySelectorAll('.kaldir-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation(); // Kart tıklamasını engelle
                    const filmId = btn.dataset.filmId;
                    
                    try {
                        const response = await fetch('http://localhost:3000/film-kaldir', {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ film_id: filmId })
                        });

                        if (response.ok) {
                            btn.closest('.film-karti').remove();
                            if (document.querySelectorAll('.film-karti').length === 0) {
                                filmListesi.innerHTML = '<p class="bos-mesaj">Henüz kaydedilmiş film bulunmuyor.</p>';
                            }
                        } else {
                            alert('Film kaldırılırken bir hata oluştu.');
                        }
                    } catch (error) {
                        console.error('Film kaldırma hatası:', error);
                        alert('Film kaldırılırken bir hata oluştu.');
                    }
                });
            });

            // İzledim butonlarına tıklama olayı ekle
            document.querySelectorAll('.izledim-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation(); // Kart tıklamasını engelle
                    const filmId = btn.dataset.filmId;
                    const filmKarti = btn.closest('.film-karti');
                    const filmBilgileri = {
                        film_adi: filmKarti.querySelector('h3').textContent,
                        afis_url: filmKarti.querySelector('img').src,
                        yil: filmKarti.querySelector('p').textContent.split('•')[0].trim(),
                        tur: filmKarti.querySelector('p').textContent.split('•')[1].trim(),
                        imdb_puani: filmKarti.querySelector('p:nth-child(3)').textContent.replace('IMDb: ', '')
                    };
                    
                    try {
                        // Önce bu film zaten izlenmiş mi kontrol et
                        const izlenenFilmlerResponse = await fetch('http://localhost:3000/izlenen-filmler', {
                            headers: {
                                'Authorization': `Bearer ${token}`
                            }
                        });

                        if (!izlenenFilmlerResponse.ok) {
                            throw new Error('İzlenen filmler getirilemedi');
                        }

                        const izlenenFilmler = await izlenenFilmlerResponse.json();
                        const filmZatenIzlenmis = izlenenFilmler.some(film => film.film_id === parseInt(filmId));

                        if (filmZatenIzlenmis) {
                            // Film zaten izlenmiş, sadece kaydedilenlerden kaldır
                            const kaldirResponse = await fetch('http://localhost:3000/film-kaldir', {
                                method: 'DELETE',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({ film_id: filmId })
                            });

                            if (kaldirResponse.ok) {
                                // Film kartını kaydedilenlerden kaldır
                                filmKarti.remove();
                                
                                // Eğer kaydedilen film kalmadıysa mesaj göster
                                if (document.querySelectorAll('#kaydedilenFilmler .film-karti').length === 0) {
                                    document.getElementById('kaydedilenFilmler').innerHTML = 
                                        '<p class="bos-mesaj">Henüz kaydedilmiş film bulunmuyor.</p>';
                                }
                            }
                            alert('Bu filmi zaten izlediniz.');
                            return;
                        }

                        // Film daha önce izlenmemiş, normal işleme devam et
                        const izlendiResponse = await fetch('http://localhost:3000/film-izlendi', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ film_id: filmId })
                        });

                        if (!izlendiResponse.ok) {
                            throw new Error('Film izlendi olarak işaretlenemedi');
                        }

                        // Sonra filmi kaydedilenlerden kaldır
                        const kaldirResponse = await fetch('http://localhost:3000/film-kaldir', {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ film_id: filmId })
                        });

                        if (kaldirResponse.ok) {
                            // Film kartını kaydedilenlerden kaldır
                            filmKarti.remove();
                            
                            // Eğer kaydedilen film kalmadıysa mesaj göster
                            if (document.querySelectorAll('#kaydedilenFilmler .film-karti').length === 0) {
                                document.getElementById('kaydedilenFilmler').innerHTML = 
                                    '<p class="bos-mesaj">Henüz kaydedilmiş film bulunmuyor.</p>';
                            }

                            // İzlenen filmler listesine yeni film kartı ekle
                            const izlenenFilmler = document.getElementById('izlenenFilmler');
                            
                            // Eğer "Henüz izlenmiş film bulunmuyor" mesajı varsa kaldır
                            if (izlenenFilmler.querySelector('.bos-mesaj')) {
                                izlenenFilmler.innerHTML = '';
                            }

                            const yeniFilmKarti = document.createElement('div');
                            yeniFilmKarti.className = 'film-karti';
                            yeniFilmKarti.innerHTML = `
                                <img src="${filmBilgileri.afis_url}" alt="${filmBilgileri.film_adi}" class="film-afis">
                                <div class="film-bilgileri">
                                    <h3>${filmBilgileri.film_adi}</h3>
                                    <p>${filmBilgileri.yil} • ${filmBilgileri.tur}</p>
                                    <p>IMDb: ${filmBilgileri.imdb_puani}</p>
                                </div>
                            `;

                            // Film kartına tıklama olayı ekle
                            yeniFilmKarti.addEventListener('click', () => {
                                window.location.href = `film_detay.html?id=${filmId}`;
                            });

                            izlenenFilmler.appendChild(yeniFilmKarti);
                        }
                    } catch (error) {
                        console.error('Film işleme hatası:', error);
                    }
                });
            });

        } catch (error) {
            console.error('Film getirme hatası:', error);
            document.getElementById('kaydedilenFilmler').innerHTML = 
                '<p class="hata-mesaj">Filmler yüklenirken bir hata oluştu.</p>';
        }
    }

    // İzlenen filmleri getir
    async function izlenenFilmleriGetir() {
        try {
            const response = await fetch('http://localhost:3000/izlenen-filmler', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                throw new Error('Filmler getirilemedi');
            }

            const filmler = await response.json();
            const filmListesi = document.getElementById('izlenenFilmler');
            filmListesi.innerHTML = ''; // Listeyi temizle

            if (filmler.length === 0) {
                filmListesi.innerHTML = '<p class="bos-mesaj">Henüz izlenmiş film bulunmuyor.</p>';
                return;
            }

            filmler.forEach(film => {
                const filmKarti = document.createElement('div');
                filmKarti.className = 'film-karti';
                filmKarti.innerHTML = `
                    <img src="${film.afis_url}" alt="${film.film_adi}" class="film-afis">
                    <div class="film-bilgileri">
                        <h3>${film.film_adi}</h3>
                        <p>${film.yil} • ${film.tur}</p>
                        <p>IMDb: ${film.imdb_puani}</p>
                    </div>
                `;

                // Film kartına tıklama olayı ekle
                filmKarti.addEventListener('click', () => {
                    window.location.href = `film_detay.html?id=${film.film_id}`;
                });

                filmListesi.appendChild(filmKarti);
            });

        } catch (error) {
            console.error('Film getirme hatası:', error);
            document.getElementById('izlenenFilmler').innerHTML = 
                '<p class="hata-mesaj">Filmler yüklenirken bir hata oluştu.</p>';
        }
    }

    // Sayfa yüklendiğinde filmleri getir
    kaydedilenFilmleriGetir();
    izlenenFilmleriGetir();

  </script>
</body>
</html>
